---
- name: Create / update homarr secrets
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: homarr-encryption-key
        namespace: jovian-prod
      type: Opaque
      stringData:
        encryption_key: "{{ HOMARR_ENCRYPTION_KEY }}"
  no_log: true

- name: Create / update Wireguard Secret
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: qbittorrent-wg-conf
        namespace: jovian-prod
      type: Opaque
      stringData:
        wg0.conf: "{{ QBITTORRENT_WIREGUARD_CONF }}"
  no_log: true

- name: Create / update qbittorrent secrets
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: qbittorrent-secrets
        namespace: jovian-prod
      type: Opaque
      stringData:
        port_forwarding_provider: "{{ PORT_FORWARDING_PROVIDER }}"
        external_ip: "{{ EXTERNAL_IP }}"
  no_log: true

- name: Create / update plex-beta secrets
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: plex-beta-secrets
        namespace: jovian-prod
      type: Opaque
      stringData:
        plex_beta_claim: "{{ PLEX_BETA_CLAIM }}"
  no_log: true

- name: Create / update plex secrets
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: plex-secrets
        namespace: jovian-prod
      type: Opaque
      stringData:
        plex_claim: "{{ PLEX_CLAIM }}"
  no_log: true

- name: Create / update Pterodactyl secrets
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: pterodactyl-secrets
        namespace: jovian-prod
      type: Opaque
      stringData:
        ptero_mysql_database: "{{ PTERO_MYSQL_DATABASE }}"
        ptero_mysql_user: "{{ PTERO_MYSQL_USER }}"
        ptero_mysql_password: "{{ PTERO_MYSQL_PASSWORD }}"
        ptero_mysql_root_password: "{{ PTERO_MYSQL_ROOT_PASSWORD }}"
        ptero_app_service_author: "{{ PTERO_APP_SERVICE_AUTHOR }}"
        ptero_app_url: "{{ PTERO_APP_URL }}"
        ptero_mail_from: "{{ PTERO_MAIL_FROM }}"
        ptero_mail_username: "{{ PTERO_MAIL_USERNAME }}"
        ptero_mail_password: "{{ PTERO_MAIL_PASSWORD }}"
        ptero_trusted_proxies: "{{ PTERO_TRUSTED_PROXIES }}"
  no_log: true

- name: Create / update cloudflare secrets
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cloudflare-secrets
        namespace: jovian-prod
      type: Opaque
      stringData:
        cloudflare_token: "{{ CFTUNNEL_TOKEN_JOVIAN_PROD }}"
  no_log: true

- name: Create / update diagrams-repo-runner secrets
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: diagrams-repo-runner-secrets
        namespace: jovian-prod
      type: Opaque
      stringData:
        git_repo: "{{ GIT_REPO }}"
        git_token: "{{ GIT_TOKEN }}"
        git_username: "{{ GIT_USERNAME }}"
  no_log: true

- name: Create / update immich secrets
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: immich-secrets
        namespace: jovian-prod
      type: Opaque
      stringData:
        immich_db_username: "{{ IMMICH_DB_USERNAME }}"
        immich_db_password: "{{ IMMICH_DB_PASSWORD }}"
        immich_db_name: "{{ IMMICH_DB_NAME }}"
  no_log: true

- name: Create / update kometa config configmap
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: kometa-config
        namespace: jovian-prod
      data:
        config.yml: |
          libraries:                           # This is called out once within the config.yml file
            Concerts:                            # These are names of libraries in your Plex
              remove_overlays: false           # Set this to true to remove all overlays
              metadata_files:
                - file: /config/concerts.yml
            Web Videos:                            # These are names of libraries in your Plex
              remove_overlays: false           # Set this to true to remove all overlays
              metadata_files:
                - file: /config/web_video.yml
          settings:
            save_report: true

          plex:                                # Can be individually specified per library as well; REQUIRED for the script to run
            url: "{{ PLEX_URL }}"
            token: "{{ PLEX_TOKEN }}"

          tmdb:                                # REQUIRED for the script to run
            apikey: "{{ TMDB_KEY }}"
            language: en

- name: Create / update paperless secrets
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: paperless-secrets
        namespace: jovian-prod
      type: Opaque
      stringData:
        paperless_postgres_db: "{{ PAPERLESS_POSTGRES_DB }}"
        paperless_postgres_user: "{{ PAPERLESS_POSTGRES_USER }}"
        paperless_postgres_password: "{{ PAPERLESS_POSTGRES_PASSWORD }}"
  no_log: true

- name: Create / update n8n secrets
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: n8n-secrets
        namespace: jovian-prod
      type: Opaque
      stringData:
        n8n_postgres_db: "{{ N8N_POSTGRES_DB }}"
        n8n_postgres_user: "{{ N8N_POSTGRES_USER }}"
        n8n_postgres_password: "{{ N8N_POSTGRES_PASSWORD }}"
        n8n_runners_auth_token: "{{ N8N_RUNNERS_AUTH_TOKEN }}"
  no_log: true
