---
- name: Create n8n Deployment
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: n8n
        namespace: jovian-prod
        labels:
          app: n8n
          service: n8n
      spec:
        progressDeadlineSeconds: 600
        replicas: 1
        revisionHistoryLimit: 3
        selector:
          matchLabels:
            app: n8n
        strategy:
          type: Recreate
        template:
          metadata:
            labels:
              app: n8n
          spec:
            nodeSelector:
              connection: standard
            initContainers:
              - name: volume-permissions-fix
                image: busybox:latest
                command: ["sh", "-c", "chown -R 1000:1000 /data"]
                volumeMounts:
                - name: n8n-config
                  mountPath: /data
                securityContext:
                  runAsUser: 0  # Must run as root to perform chown
            containers:
            - name: postgres
              image: docker.io/library/postgres:18
              imagePullPolicy: Always
              ports:
              - containerPort: 5432
                name: n8n-db
                protocol: TCP
              volumeMounts:
              - name: n8n-db-config
                mountPath: /var/lib/postgresql
              env:
              - name: TZ
                value: 'America/Chicago'
              - name: PUID
                value: '1000'
              - name: PGID
                value: '1000'
              - name: POSTGRES_USER
                value: "{{ N8N_POSTGRES_USER }}"
              - name: POSTGRES_PASSWORD
                value: "{{ N8N_POSTGRES_PASSWORD }}"
              - name: POSTGRES_DB
                value: "{{ N8N_POSTGRES_DB }}"
            - name: n8n
              image: aegisfatedh/n8n-custom:latest
              imagePullPolicy: Always
              securityContext:
                runAsUser: 1000
              ports:
              - containerPort: 5678
                name: n8n-http
                protocol: TCP
              env:
              - name: TZ
                value: 'America/Chicago'
              - name: PUID
                value: '1000'
              - name: PGID
                value: '1000'
              - name: DB_TYPE
                value: 'postgresdb'
              - name: DB_POSTGRESDB_HOST
                value: 'localhost'
              - name: DB_POSTGRESDB_PORT
                value: '5432'
              - name: DB_POSTGRESDB_DATABASE
                value: "{{ N8N_POSTGRES_DB }}"
              - name: DB_POSTGRESDB_USER
                value: "{{ N8N_POSTGRES_USER }}"
              - name: DB_POSTGRESDB_PASSWORD
                value: "{{ N8N_POSTGRES_PASSWORD }}"
              - name: N8N_RUNNERS_MODE
                value: 'external'
              - name: N8N_RUNNERS_AUTH_TOKEN
                value: "{{ N8N_RUNNERS_AUTH_TOKEN }}"
              - name: N8N_RUNNERS_BROKER_LISTEN_ADDRESS
                value: '0.0.0.0'
              - name: N8N_EXECUTE_COMMAND
                value: 'true'
              - name: NODES_EXCLUDE
                value: '[]'
              - name: NODE_FUNCTION_ALLOW_BUILTIN
                value: '*'
              - name: NODE_FUNCTION_ALLOW_EXTERNAL
                value: 'exiftool-vendored'
              - name: N8N_RUNNERS_EXTERNAL_ALLOW
                value: '*'
              volumeMounts:
              - name: n8n-config
                mountPath: /home/node/.n8n
              - name: n8n-syn-coruscant
                mountPath: /home/node/.n8n-files/dropbox
            - name: n8n-runner
              image: n8nio/runners:stable
              imagePullPolicy: Always
              ports:
              - containerPort: 5679
                name: n8n-runner-task
                protocol: TCP
              env:
              - name: TZ
                value: 'America/Chicago'
              - name: PUID
                value: '1000'
              - name: PGID
                value: '1000'
              - name: N8N_RUNNERS_AUTH_TOKEN
                value: "{{ N8N_RUNNERS_AUTH_TOKEN }}"
              - name: N8N_RUNNERS_TASK_BROKER_URI
                value: 'http://localhost:5679'
              - name: NODE_FUNCTION_ALLOW_BUILTIN
                value: '*'
              - name: NODE_FUNCTION_ALLOW_EXTERNAL
                value: 'exiftool-vendored'
              - name: N8N_RUNNERS_STDLIB_ALLOW
                value: '*'
              volumeMounts:
              - name: n8n-syn-coruscant
                mountPath: /home/node/.n8n-files/dropbox
            volumes:
            - name: n8n-config
              persistentVolumeClaim:
                claimName: n8n-pvc
                readOnly: false
            - name: n8n-db-config
              persistentVolumeClaim:
                claimName: n8n-db-pvc
                readOnly: false
            - name: db-init-config
              configMap:
                name: n8n-db-config
            - name: n8n-syn-coruscant
              persistentVolumeClaim:
                claimName: n8n-external-smb-pvc
                readOnly: false

- name: Create n8n Service
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: service
      metadata:
        name: n8n-service
        namespace: jovian-prod
      spec:
        selector:
          app: n8n
        ports:
          - port: 5678
            targetPort: n8n-http
            protocol: TCP
            name: n8n-http

- name: Create n8n Ingress
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: n8n-ingress
        namespace: jovian-prod
        annotations:
          traefik.ingress.kubernetes.io/router.tls: "true"
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
      spec:
        rules:
          - host: n8n.jovian.local.sch-apps.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name:  n8n-service
                      port:
                        number: 5678

- name: Create n8n PVC
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: n8n-pvc
        namespace: jovian-prod
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: k8s-cephfs
        resources:
          requests:
            storage: 20Gi

- name: Create n8n DB PVC
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: n8n-db-pvc
        namespace: jovian-prod
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: k8s-cephfs
        resources:
          requests:
            storage: 20Gi

# Syn-Coruscant
# https://github.com/kubernetes-csi/csi-driver-smb/blob/master/deploy/example/e2e_usage.md#option2-pvpvc-usage
- name: Create the N8N Syn-Coruscant SMB PV
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolume
      metadata:
        annotations:
          pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
        name: n8n-sync-external-smb
      spec:
        capacity:
          storage: 5Ti
        accessModes:
          - ReadWriteMany
        persistentVolumeReclaimPolicy: Retain
        storageClassName: smb-csi-n8n-syn
        mountOptions:
          - dir_mode=0777
          - file_mode=0777
        csi:
          driver: smb.csi.k8s.io
          # volumeHandle format: {smb-server-address}#{sub-dir-name}#{share-name}
          # make sure this value is unique for every share in the cluster
          volumeHandle: 192.168.100.42/Dropbox
          volumeAttributes:
            source: //192.168.100.42/Dropbox
          nodeStageSecretRef:
            name: smb-syn-n8n
            namespace: jovian-prod

- name: Create N8N Syn-Coruscant SMB PVC
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: n8n-external-smb-pvc
        namespace: jovian-prod
      spec:
        accessModes:
          - ReadWriteMany
        storageClassName: smb-csi-n8n-syn
        resources:
          requests:
            storage: 5Ti
        volumeName: n8n-sync-external-smb

