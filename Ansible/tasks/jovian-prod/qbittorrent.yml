---
- name: Create Wireguard Secret
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: qbittorrent-wg-conf
        namespace: jovian-prod
      stringData:
        wg0.conf: "{{ QBITTORRENT_WIREGUARD_CONF }}"

- name: Create qbittorrent Deployment
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: qbittorrent
        namespace: jovian-prod
        labels:
          app: qbittorrent
          service: media-backend
      spec:
        progressDeadlineSeconds: 600
        replicas: 1
        revisionHistoryLimit: 3
        selector:
          matchLabels:
            app: qbittorrent
        strategy:
          type: Recreate
        template:
          metadata:
            labels:
              app: qbittorrent
          spec:
            nodeSelector:
              connection: standard
            initContainers:
            - name: gluetun
              # if you do not add restartPolicy the other init containers will never start
              # it will be an initContainer and not a native sidecar container https://kubernetes.io/docs/concepts/workloads/pods/sidecar-containers/
              restartPolicy: Always
              # Version pinned specifically to account for constant healthcheck failures in later versions
              image: ghcr.io/qdm12/gluetun:v3.40.4
              ports:
              - containerPort: 8080
                name: qbitt-http
                protocol: TCP
              lifecycle:
                postStart:
                  exec:
                    command: ["/bin/sh", "-c", "(ip rule del table 51820; ip -6 rule del table 51820) || true"]
              imagePullPolicy: Always
              securityContext:
                privileged: true
                capabilities:
                  add:
                  - 'NET_ADMIN'
              env:
              - name: TZ
                value: 'America/Chicago'
              - name: VPN_SERVICE_PROVIDER
                value: 'custom'
              - name: VPN_TYPE
                value: 'wireguard'
              - name: VPN_PORT_FORWARDING
                value: 'on'
              - name: VPN_PORT_FORWARDING_PROVIDER
                value: "{{ PORT_FORWARDING_PROVIDER }}"
              - name: FIREWALL_OUTBOUND_SUBNETS
                value: '10.42.0.0/24,192.168.6.0/24'
              - name: DNS_UPSTREAM_RESOLVER_TYPE
                value: 'doh'
              # Manually added these environment variables via Rancher WebUI: https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/vpn-port-forwarding.md
              volumeMounts:
              - name: dev-net-tun
                mountPath: /dev/net/tun
              - name: wg-conf
                mountPath: /gluetun/wireguard/wg0.conf
                subPath: wg0.conf
            - name: curlpodtest
              image: curlimages/curl
              command: ['/bin/sh', '-c']
              args:
              - &check-ip |
                  IP=$(curl -s checkip.amazonaws.com)
                  EXPECTED_IP="YOUR_IP_ADDRESS"
                  if [ "$IP" != "$EXPECTED_IP" ]; then
                    echo "IP is different from $EXPECTED_IP. Current IP is $IP."
                  else
                    echo "IP is $EXPECTED_IP. Exiting..."
                    exit 1
                  fi
            containers:
            - name: qbittorrent
              image: ghcr.io/hotio/qbittorrent
              imagePullPolicy: IfNotPresent
              ports:
              - containerPort: 8080
                name: qbitt-http
                protocol: TCP   
              volumeMounts:
              - name: config
                mountPath: /config
              - name: nfs-media
                mountPath: /nfs-media
              env:
              - name: TZ
                value: 'America/Chicago'
              - name: PUID
                value: '1000'
              - name: PGID
                value: '1000'
              - name: WEBUI_PORTS
                value: '8080/tcp,8080/udp'
              - name: LIBTORRENT
                value: 'v1'
            volumes:
            - name: config
              persistentVolumeClaim:
                claimName: qbittorrent-pvc
                readOnly: false
            - name: nfs-media
              persistentVolumeClaim:
                claimName: qbittorrent-smb-media-pvc
            - name: dev-net-tun
              hostPath:
                path: /dev/net/tun
            - name: wg-conf
              secret:
                secretName: qbittorrent-wg-conf

- name: Create qbittorrent Service
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: service
      metadata:
        name: qbittorrent-service
        namespace: jovian-prod
      spec:
        selector:
          app: qbittorrent
        ports:
          - port: 8080
            targetPort: qbitt-http
            protocol: TCP
            name: qbitt-http

- name: Create qbittorrent Ingress
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: qbittorrent-ingress
        namespace: jovian-prod
        annotations:
          traefik.ingress.kubernetes.io/router.tls: "true"
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
      spec:
        rules:
          - host: qbittorrent.jovian.local.sch-apps.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name:  qbittorrent-service
                      port:
                        number: 8080

- name: Create qbittorrent PVC
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: qbittorrent-pvc
        namespace: jovian-prod
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: k8s-cephfs
        resources:
          requests:
            storage: 1Gi

# https://github.com/kubernetes-csi/csi-driver-smb/blob/master/deploy/example/e2e_usage.md#option2-pvpvc-usage
- name: Create the SMB PV
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolume
      metadata:
        annotations:
          pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
        name: qbittorrent-smb-media
      spec:
        capacity:
          storage: 72Ti
        accessModes:
          - ReadWriteMany
        persistentVolumeReclaimPolicy: Retain
        storageClassName: smb-csi-media
        mountOptions:
          - dir_mode=0777
          - file_mode=0777
        csi:
          driver: smb.csi.k8s.io
          # volumeHandle format: {smb-server-address}#{sub-dir-name}#{share-name}
          # make sure this value is unique for every share in the cluster
          volumeHandle: 192.168.100.162/media
          volumeAttributes:
            source: //192.168.100.162/media
          nodeStageSecretRef:
            name: smb-media-manangers
            namespace: jovian-prod

- name: Create qbittorrent SMB PVC
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: qbittorrent-smb-media-pvc
        namespace: jovian-prod
      spec:
        accessModes:
          - ReadWriteMany
        storageClassName: smb-csi-media
        resources:
          requests:
            storage: 72Ti
        volumeName: qbittorrent-smb-media
